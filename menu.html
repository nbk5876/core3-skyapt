<title>Sky Apt</title>
<style>
  :root {
    --radius: 6px;
    --card-bg-top: #f9f9f9;
    --card-bg-bot: #e3e3e3;
    --card-border: #d0d0d0;
    --text: #111;
  }
  body {
    font-family: Arial, Helvetica, sans-serif;
    background: #f7f7f7;
    margin: 0;
    padding: 1rem;
    color: var(--text);
  }
  h1 {
    text-align: center;
    color: #222;
    margin: 1rem 0 0.25rem;
    font-size: 1.8rem;
  }
  .btn-grid {
    max-width: 600px;
    margin: 1rem auto;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 0.6rem;
  }
  .btn-grid a {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0.45rem 0.6rem;
    color: var(--text);
    text-decoration: none;
    text-align: center;
    font-size: 0.88rem;
    font-weight: 700;
    border-radius: var(--radius);
    background: linear-gradient(180deg, var(--card-bg-top), var(--card-bg-bot));
    border: 1px solid var(--card-border);
    box-shadow:
      inset 0 3px 0 rgba(255,255,255,0.95),
      inset 0 -3px 0 rgba(0,0,0,0.20),
      0 5px 12px rgba(0,0,0,0.15);
    transition: box-shadow .18s ease, transform .08s ease-in-out;
    white-space: nowrap;
  }
  .btn-grid a:hover {
    box-shadow:
      inset 0 6px 0 rgba(255,255,255,0.99),
      inset 0 -6px 0 rgba(0,0,0,0.26),
      0 14px 22px rgba(0,0,0,0.22);
    transform: translateY(-4px);
  }
  .btn-grid a:active {
    transform: translateY(-1px);
    box-shadow:
      inset 0 3px 0 rgba(255,255,255,0.94),
      inset 0 -3px 0 rgba(0,0,0,0.22),
      0 6px 10px rgba(0,0,0,0.18);
  }
</style>
</head>
<body>
